# Default values for todo-app
# This is a YAML-formatted file.
# Generated by AI Agent per SP-0.2 (AI-Only Execution)

# Global configuration
global:
  namespace: todo
  imagePullPolicy: IfNotPresent

# Backend Configuration (FastAPI)
backend:
  enabled: true
  name: todo-backend
  image:
    repository: todo-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
  env:
    DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/tododb"
    JWT_SECRET: "change-me-in-production"
    ALGORITHM: "HS256"
    ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    OPENAI_API_KEY: ""
  secrets:
    enabled: false
    name: todo-backend-secrets

# Frontend Configuration (Next.js)
frontend:
  enabled: true
  name: todo-frontend
  image:
    repository: todo-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: NodePort
    port: 3000
    targetPort: 3000
    nodePort: 30080
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
  env:
    NEXT_PUBLIC_API_URL: "http://todo-backend:8000"

# Optional PostgreSQL (for local development)
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "15-alpine"
  persistence:
    enabled: true
    size: 1Gi
  env:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: tododb

# Ingress Configuration (optional)
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: todo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
